name: Test Dockerfile Go Version

on:
  workflow_dispatch:

permissions: read-all

jobs:
  test-dockerfile-go-version:
    name: Test Dockerfile Go Version
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go from publish CI setting
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Show runner Go version
        run: |
          echo "Runner Go version from setup-go go-version=1.26:"
          go version

      - name: Show Dockerfile builder version
        run: |
          echo "Dockerfile builder line:"
          grep -n '^FROM .*golang:' httpserver/Dockerfile

      - name: Build image from Dockerfile
        run: |
          docker build -f httpserver/Dockerfile -t ratify-go-version-test:local .

      - name: Show final image binary Go version
        run: |
          cid=$(docker create ratify-go-version-test:local)
          docker cp "$cid:/app/ratify" ./ratify
          docker rm "$cid"
          echo "Final image /app/ratify Go build info:"
          go version -m ./ratify | sed -n '1,25p'
